<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>만리서재 — 기록</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="hall">
    <h1>만리서재</h1>
    <section id="paper" aria-label="기록">
      <p id="label" class="paper-question"></p>
      <p id="rq" class="paper-question"></p>
      <div id="ra" class="paper-answer"></div>
      <p class="signature" id="sig" hidden>— 삽만리</p>
    </section>
    <p style="text-align:center; margin-top:3rem"><a href="/" style="color:#6f6a61">서재 입구로</a></p>
  </main>
  <script>
    (async () => {
      const n = new URLSearchParams(location.search).get("n");
      const label = document.getElementById("label");
      if (!n) { label.textContent = "번호가 없습니다."; return; }
      try {
        const res = await fetch(`/api/record/${encodeURIComponent(n)}`);
        const data = await res.json();
        if (!res.ok) { label.textContent = data.error; return; }
        label.textContent = data.label;
        document.getElementById("rq").textContent = data.question;
        document.getElementById("ra").replaceChildren(
          ...data.answer.split(/\n{2,}/).map((para) => {
            const p = document.createElement("p");
            p.textContent = para.replace(/\n/g, " ");
            return p;
          }),
        );
        document.getElementById("sig").hidden = false;
      } catch {
        label.textContent = "기록을 불러오지 못했습니다.";
      }
    })();
  </script>
</body>
</html>
