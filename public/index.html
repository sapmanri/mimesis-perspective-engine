<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>만리서재</title>
  <meta name="description" content="모든 질문에는 저마다의 형태가 있습니다. 이곳은 그 질문을 먼저 바라보는 서재입니다." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main id="hall">
    <section id="entrance" aria-label="서재 입구">
      <h1>만리서재</h1>
      <p class="intro">
        모든 질문에는 저마다의 형태가 있습니다.<br />
        이곳은 그 질문을 먼저 바라보는 서재입니다.
      </p>
      <form id="ask-form">
        <textarea
          id="question"
          name="question"
          rows="3"
          maxlength="500"
          placeholder="오늘은 무엇을 들고 오셨나요?"
          aria-label="질문"
        ></textarea>
        <button id="knock" type="submit">문을 두드립니다.</button>
      </form>
      <p id="loading" hidden></p>
      <p id="error" role="alert" hidden></p>
    </section>

    <section id="paper" aria-label="답" hidden>
      <p id="paper-question" class="paper-question"></p>
      <div id="paper-answer" class="paper-answer"></div>
      <p class="signature">— 삽만리</p>
      <div id="archive-consent">
        <label>
          <input type="checkbox" id="consent" />
          이 질문과 답을 만리서재 기록 보관소에 남겨도 좋습니다.
        </label>
        <p id="archived-note" hidden></p>
      </div>
      <button id="again" type="button">다른 질문을 들고 다시 두드립니다.</button>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
