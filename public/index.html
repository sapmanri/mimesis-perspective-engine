<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>만리서재</title>
  <meta name="description" content="질문을 통해 스스로 답을 발견하는 디지털 서재." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-phase="entrance">

  <!-- 입장 -->
  <section id="entrance" class="phase" aria-label="입구">
    <div class="entrance-inner">
      <h1>만리서재</h1>
      <p class="intro">
        모든 질문에는 저마다의 형태가 있습니다.<br />
        이곳은 그 질문을 먼저 바라보는 서재입니다.
      </p>
      <button id="enter" class="quiet-button">문을 엽니다.</button>
    </div>
  </section>

  <!-- 예약석 -->
  <section id="seats" class="phase" aria-label="예약석">
    <p class="seats-guide">오늘은 어느 자리에 앉으시겠어요?</p>
    <div class="seat-list">
      <figure class="seat" data-seat="fireplace" tabindex="0" role="button" aria-label="벽난로 옆 흔들의자">
        <div class="scene scene-fireplace">
          <div class="glow"></div>
          <svg class="silhouette" viewBox="0 0 200 130" aria-hidden="true">
            <path d="M30 25 h44 v60 h-44 z" fill="#120c08" />
            <path d="M36 40 h32 v45 h-32 z" fill="#2a160a" />
            <g stroke="#171009" stroke-width="5" fill="none" stroke-linecap="round">
              <path d="M122 118 q28 12 58 0" />
              <path d="M140 110 L134 88 L142 44" />
              <path d="M142 44 q12 -8 22 0" />
              <path d="M136 86 h34" />
              <path d="M170 86 L168 112" />
              <path d="M139 92 h29" />
              <path d="M144 68 h24 q4 0 4 6 l-2 12" />
            </g>
          </svg>
        </div>
        <figcaption>
          <strong>벽난로 옆 흔들의자</strong>
          <span>감정을 가라앉히는 자리</span>
        </figcaption>
      </figure>

      <figure class="seat" data-seat="desk" tabindex="0" role="button" aria-label="낡은 책상과 타자기">
        <div class="scene scene-desk">
          <div class="beam"></div>
          <svg class="silhouette" viewBox="0 0 200 130" aria-hidden="true">
            <rect x="20" y="18" width="52" height="64" rx="2" fill="none" stroke="#8a7c62" stroke-width="3" />
            <line x1="46" y1="18" x2="46" y2="82" stroke="#8a7c62" stroke-width="2" />
            <line x1="20" y1="50" x2="72" y2="50" stroke="#8a7c62" stroke-width="2" />
            <rect x="30" y="98" width="150" height="5" fill="#4a3e2e" />
            <rect x="42" y="103" width="6" height="24" fill="#4a3e2e" />
            <rect x="160" y="103" width="6" height="24" fill="#4a3e2e" />
            <path d="M96 98 v-14 h44 v14 M100 84 v-8 h36 v8 M108 76 h20 v-6 h-20 z" fill="#3a3226" />
            <rect x="150" y="92" width="18" height="3" fill="#3a3226" />
          </svg>
        </div>
        <figcaption>
          <strong>낡은 책상과 타자기</strong>
          <span>생각을 정리하는 자리</span>
        </figcaption>
      </figure>

      <figure class="seat" data-seat="nook" tabindex="0" role="button" aria-label="책 더미와 무릎담요">
        <div class="scene scene-nook">
          <div class="rain-window"><div class="rain"></div></div>
          <div class="lamp"></div>
          <svg class="silhouette" viewBox="0 0 200 130" aria-hidden="true">
            <path d="M116 128 v-52 q0 -10 10 -10 h44 q10 0 10 10 v52" fill="#0b0e15" />
            <rect x="122" y="86" width="52" height="26" rx="4" fill="#161b28" />
            <rect x="24" y="112" width="52" height="8" fill="#0b0e15" />
            <rect x="30" y="104" width="44" height="8" fill="#111624" />
            <rect x="26" y="96" width="40" height="8" fill="#0b0e15" />
            <rect x="34" y="88" width="30" height="8" fill="#141a2a" />
          </svg>
        </div>
        <figcaption>
          <strong>책 더미와 무릎담요</strong>
          <span>오래 머무르는 자리</span>
        </figcaption>
      </figure>
    </div>
  </section>

  <!-- 착석 — 원고 -->
  <section id="room" class="phase" aria-label="자리">
    <div id="room-backdrop" class="scene"></div>
    <div class="manuscript-wrap">
      <div id="manuscript" class="manuscript">
        <p class="line-library">오늘 어떤 질문을 품고 오셨나요?</p>
      </div>
      <form id="write-form">
        <textarea id="writing" rows="2" maxlength="1000" placeholder="이 자리에서, 적어 내려가세요." aria-label="적기"></textarea>
        <div class="write-actions">
          <button type="submit" class="quiet-button" id="write-btn">적어 놓습니다.</button>
          <button type="button" class="ghost-button" id="rise-btn">자리에서 일어납니다.</button>
        </div>
      </form>
      <p id="room-error" role="alert" hidden></p>
    </div>
  </section>

  <!-- 일어나기 -->
  <section id="closing" class="phase" aria-label="마무리">
    <div class="manuscript closing-paper">
      <p class="closing-head">오늘 처음의 질문</p>
      <p id="c-first" class="closing-body"></p>
      <p class="closing-head">오늘 새롭게 발견한 질문</p>
      <p id="c-found" class="closing-body"></p>
      <p class="closing-head">오늘 당신이 남긴 문장</p>
      <p id="c-sentence" class="closing-body"></p>
      <p id="c-farewell" class="farewell"></p>
      <p class="signature">— 만리서재</p>
      <button id="leave" class="quiet-button">서재를 나섭니다.</button>
    </div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
