<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>만리서재 — 입구 기준 컷 (코드 구현)</title>
<style>
  html, body { margin: 0; padding: 0; background: #0A0908; height: 100%; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; font-family: Georgia, 'Times New Roman', serif; }
  .frame { width: min(96vw, calc(92vh * 1.5)); }
  svg { display: block; width: 100%; height: auto; }
  .caption { color: #5E574C; font-size: 12px; letter-spacing: 0.08em; margin-top: 12px;
             text-align: center; line-height: 1.7; }
  .caption em { color: #7E7364; font-style: normal; }

  /* 공간의 맥박 — lighting-and-camera.md: 밝기 변동 합계 ±4% 이내 */
  @keyframes fire-breathe {
    0%   { opacity: 0.94; } 13% { opacity: 1.0; } 26% { opacity: 0.955; }
    41%  { opacity: 0.985;} 57% { opacity: 0.94; } 72% { opacity: 1.0; }
    86%  { opacity: 0.96; } 100% { opacity: 0.94; }
  }
  @keyframes lamp-breathe { 0%,100% { opacity: 0.97; } 50% { opacity: 1.0; } }
  .fire-light { animation: fire-breathe 7.3s ease-in-out infinite; }
  .lamp-light { animation: lamp-breathe 9.1s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .fire-light, .lamp-light { animation: none; } }
</style>
</head>
<body>
<div class="frame">
<!--
  만리서재 입구 기준 컷 — 코드 구현 (엄밀 투영)
  시점: 남벽 문 (3.6, 0), 눈높이 1.5m, 북향. 28mm 풀프레임 (수평 반화각 32.7°).
  투영: u = 750 + 1173·(x−3.6)/y ,  v = 500 − 1173·(z−1.5)/y   (1500×1000, 3:2)
  좌표 원본: docs/manri-visual-bible/spatial-layout.md 3절 고정 좌표.
  광원 봉인 (Vase 판정 2026-07-20): 벽난로 · 플로어 스탠드 · 북창 잔광 셋뿐.
  책상 램프 소등, 초 없음. 창밖은 의도적 비확정 — 잔광 그라디언트만.
-->
<svg viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="이른 저녁의 만리서재, 입구에서 북쪽을 본 장면">
  <defs>
    <!-- 북창 잔광 — the last fading blue-grey dusk. 창밖은 정의하지 않는다. -->
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#67758F"/>
      <stop offset="0.5"  stop-color="#4E5C76"/>
      <stop offset="1"    stop-color="#303A4E"/>
    </linearGradient>
    <!-- 벽 기저: 석회 회벽이 저녁 어스름에 잠긴 톤 -->
    <linearGradient id="wallBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#242019"/>
      <stop offset="0.5"  stop-color="#2B2620"/>
      <stop offset="1"    stop-color="#211C16"/>
    </linearGradient>
    <!-- 바닥 기저 -->
    <linearGradient id="floorBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221A11"/>
      <stop offset="1" stop-color="#140F0A"/>
    </linearGradient>
    <!-- 난롯불 — 프레임 밖 왼쪽 아래에서 방으로 밀려 들어오는 1900K -->
    <radialGradient id="fireFloor" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(-80 975) rotate(-6) scale(980 480)">
      <stop offset="0"    stop-color="#E8853A" stop-opacity="0.95"/>
      <stop offset="0.3"  stop-color="#B5651F" stop-opacity="0.6"/>
      <stop offset="0.62" stop-color="#6E3F16" stop-opacity="0.24"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fireWall" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(-140 850) scale(740 640)">
      <stop offset="0"    stop-color="#B06428" stop-opacity="0.66"/>
      <stop offset="0.45" stop-color="#7C4A20" stop-opacity="0.26"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fireCeil" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(-120 40) scale(520 300)">
      <stop offset="0"  stop-color="#8A5224" stop-opacity="0.12"/>
      <stop offset="1"  stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- 스탠드 — 2400K -->
    <radialGradient id="lampPool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(1458 880) scale(340 190)">
      <stop offset="0"   stop-color="#E8A55C" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#A9763E" stop-opacity="0.25"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampWall" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(1470 560) scale(420 460)">
      <stop offset="0"   stop-color="#C08A48" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#8A6234" stop-opacity="0.12"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- 창이 흘리는 잔광 — 거의 꺼져가는 빛 -->
    <radialGradient id="windowSpill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(706 760) scale(240 110)">
      <stop offset="0"   stop-color="#46525F" stop-opacity="0.26"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="windowHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
                    gradientTransform="translate(706 445) scale(300 380)">
      <stop offset="0"    stop-color="#4C5866" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#3C4550" stop-opacity="0.08"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- 스탠드 갓 -->
    <radialGradient id="shadeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#FFD9A0" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#F2B876" stop-opacity="0.85"/>
      <stop offset="1"    stop-color="#C98F55" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="shadeHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#F5BE7E" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#D69C5C" stop-opacity="0.12"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- 천장 -->
    <linearGradient id="ceilBase" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#211C16"/>
      <stop offset="1" stop-color="#161310"/>
    </linearGradient>
    <!-- 러그 -->
    <linearGradient id="rug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4E2A23"/>
      <stop offset="1" stop-color="#3A211B"/>
    </linearGradient>
    <!-- 회벽·목재의 미세 결 -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.5  0 0 0 0 0.47  0 0 0 0 0.42  0 0 0 0.04 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <!-- 회벽의 큰 얼룩 (석회벽의 불균질) -->
    <filter id="plaster" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.004 0.007" numOctaves="3" seed="4" result="p"/>
      <feColorMatrix in="p" type="matrix"
        values="0 0 0 0 0.35  0 0 0 0 0.31  0 0 0 0 0.26  0 0 0 0.045 0"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <filter id="soft2"  x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="soft6"  x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="soft14" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <!-- 오래된 파도유리의 일렁임 -->
    <filter id="wavyGlass">
      <feTurbulence type="turbulence" baseFrequency="0.012 0.05" numOctaves="2" seed="11" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ══ 방의 뼈대 ══ -->

  <!-- 천장: 북벽 상단(v=152)에서 시점 쪽으로 -->
  <polygon points="-40,152 1540,152 2150,-120 -650,-120" fill="url(#ceilBase)"/>
  <rect class="fire-light" x="-40" y="-40" width="700" height="200" fill="url(#fireCeil)"/>

  <!-- 노출 들보 (동서, y≈4.05 들보만 프레임에): v 36…88 -->
  <rect x="-40" y="36" width="1580" height="52" fill="#1D1610"/>
  <rect x="-40" y="82" width="1580" height="6" fill="#120D09"/>
  <rect class="fire-light" x="-40" y="36" width="440" height="52" fill="#4E3018" opacity="0.4" filter="url(#soft6)"/>

  <!-- 북벽 (y=5.4): u −32…1532, v 152…826 -->
  <g filter="url(#plaster)">
    <rect x="-32" y="152" width="1564" height="674" fill="url(#wallBase)"/>
  </g>
  <!-- 창 주위에 스미는 차가운 잔광 -->
  <rect x="-32" y="152" width="1564" height="674" fill="url(#windowHalo)"/>
  <!-- 난롯불이 벽 왼쪽 아래를 어루만지는 사광 -->
  <rect class="fire-light" x="-32" y="152" width="1000" height="674" fill="url(#fireWall)"/>
  <!-- 스탠드가 벽 오른쪽에 남기는 온기 -->
  <rect class="lamp-light" x="700" y="152" width="832" height="674" fill="url(#lampWall)"/>
  <!-- 벽 하단 걸레받이 그늘 -->
  <rect x="-32" y="810" width="1564" height="16" fill="#171310" opacity="0.9"/>

  <!-- ══ 북창 (3.4, 5.4) 90×180cm — 잔광을 머금은 파도유리 ══ -->
  <g>
    <!-- 깊은 문설주: 안쪽 면이 잔광을 받는다 -->
    <rect x="594" y="236" width="224" height="419" fill="#191512"/>
    <rect x="599" y="241" width="8" height="409" fill="#46505E" opacity="0.8"/>
    <rect x="806" y="241" width="8" height="409" fill="#333B46" opacity="0.7"/>
    <rect x="599" y="241" width="215" height="7" fill="#4A5462" opacity="0.75"/>
    <!-- 유리: 창밖은 의도적으로 비확정 — 잔광의 그라디언트만 존재한다 -->
    <g filter="url(#wavyGlass)">
      <rect x="609" y="250" width="195" height="391" fill="url(#dusk)"/>
      <ellipse cx="664" cy="326" rx="42" ry="92" fill="#6E7C94" opacity="0.22"/>
      <ellipse cx="752" cy="462" rx="34" ry="72" fill="#546174" opacity="0.18"/>
    </g>
    <!-- 새시 창살 -->
    <g fill="#15110D">
      <rect x="700" y="250" width="12" height="391"/>
      <rect x="609" y="378" width="195" height="13"/>
      <rect x="609" y="510" width="195" height="11"/>
      <rect x="604" y="244" width="206" height="8"/>
      <rect x="604" y="636" width="206" height="10"/>
      <rect x="604" y="244" width="6" height="402"/>
      <rect x="804" y="244" width="6" height="402"/>
    </g>
    <!-- 창살 모서리에 걸리는 차가운 빛 -->
    <g fill="#66718470" opacity="0.8">
      <rect x="700" y="250" width="2" height="391"/>
      <rect x="609" y="378" width="195" height="2"/>
      <rect x="609" y="510" width="195" height="2"/>
    </g>
    <!-- 창턱 (85cm) -->
    <rect x="590" y="646" width="232" height="13" fill="#2A231C"/>
    <rect x="590" y="646" width="232" height="3.5" fill="#4E5864" opacity="0.6"/>
  </g>

  <!-- ══ 바닥 ══ -->
  <polygon points="-32,826 1532,826 2600,1060 -1100,1060" fill="url(#floorBase)"/>
  <!-- 오크 플랭크 이음선 (소실점 750,500 방향) -->
  <g stroke="#0E0A06" stroke-width="2.2" opacity="0.75">
    <line x1="176" y1="826" x2="-560" y2="1060"/>
    <line x1="368" y1="826" x2="-120" y2="1060"/>
    <line x1="560" y1="826" x2="320"  y2="1060"/>
    <line x1="750" y1="826" x2="750"  y2="1060"/>
    <line x1="940" y1="826" x2="1180" y2="1060"/>
    <line x1="1132" y1="826" x2="1620" y2="1060"/>
    <line x1="1324" y1="826" x2="2060" y2="1060"/>
  </g>
  <!-- 중간 플랭크 이음선 (더 촘촘한 절반 간격) -->
  <g stroke="#0E0A06" stroke-width="1.4" opacity="0.45">
    <line x1="272" y1="826" x2="-71" y2="1060"/>
    <line x1="464" y1="826" x2="259" y2="1060"/>
    <line x1="656" y1="826" x2="588" y2="1060"/>
    <line x1="845" y1="826" x2="913" y2="1060"/>
    <line x1="1036" y1="826" x2="1241" y2="1060"/>
    <line x1="1228" y1="826" x2="1571" y2="1060"/>
  </g>
  <!-- 가로 이음 (아주 희미하게) -->
  <g stroke="#0E0A06" stroke-width="1.4" opacity="0.18">
    <line x1="-32" y1="852" x2="1532" y2="852"/>
    <line x1="-80" y1="892" x2="1580" y2="892"/>
    <line x1="-160" y1="948" x2="1660" y2="948"/>
  </g>
  <!-- 세 개의 빛 웅덩이 — 어두운 중간지대를 사이에 두고 -->
  <polygon points="-32,826 1532,826 2600,1060 -1100,1060" fill="url(#windowSpill)"/>
  <polygon class="lamp-light" points="-32,826 1532,826 2600,1060 -1100,1060" fill="url(#lampPool)"/>
  <polygon class="fire-light" points="-32,826 1532,826 2600,1060 -1100,1060" fill="url(#fireFloor)"/>
  <!-- 난롯불 웅덩이의 뜨거운 심 — 프레임 왼쪽 아래로 들어오는 부분 -->
  <ellipse class="fire-light" cx="40" cy="965" rx="330" ry="110" fill="#E8853A" opacity="0.30" filter="url(#soft14)"/>

  <!-- 러그 뒷단 (y=3.7): 전경 하단에 가장자리만 -->
  <polygon points="306,976 1194,976 1520,1012 -20,1012" fill="url(#rug)"/>
  <polygon points="306,976 1194,976 1206,979.5 294,979.5" fill="#6B4038" opacity="0.7"/>
  <g stroke="#5E362E" stroke-width="2" opacity="0.45">
    <line x1="330" y1="988" x2="1240" y2="988"/>
  </g>
  <polygon class="fire-light" points="306,976 720,976 640,1012 -20,1012" fill="#96502A" opacity="0.42" filter="url(#soft6)"/>

  <!-- ══ 책상 자리 (중앙): 북창 아래 — 구조가 가장 명확해야 하는 곳 ══ -->
  <g>
    <ellipse cx="700" cy="856" rx="240" ry="24" fill="#0B0806" opacity="0.6" filter="url(#soft6)"/>
    <!-- 뒷다리 -->
    <rect x="548" y="668" width="9" height="150" fill="#191208"/>
    <rect x="857" y="668" width="9" height="150" fill="#191208"/>
    <!-- 책상 의자 (북향, 밀어 넣힘): 다리와 등받이 하단만 책상 아래 그늘에 -->
    <g fill="#150F08">
      <rect x="682" y="716" width="7" height="98"/>
      <rect x="728" y="716" width="7" height="98"/>
      <polygon points="678,716 740,716 738,700 680,700"/>
    </g>
    <!-- 앞다리 (y=4.8) -->
    <rect x="521" y="686" width="12" height="180" fill="#20170C"/>
    <rect x="869" y="686" width="12" height="180" fill="#20170C"/>
    <!-- 상판: (518,683)(884,683)(869,663)(544,663) -->
    <polygon points="518,683 884,683 869,663 544,663" fill="#3E2E1D"/>
    <!-- 상판 위 차가운 잔광 -->
    <polygon points="566,681 836,681 824,665 582,665" fill="#4E5765" opacity="0.20" filter="url(#soft2)"/>
    <!-- 상판 앞면·에이프런 -->
    <polygon points="518,683 884,683 884,696 518,696" fill="#2B1F12"/>
    <rect x="518" y="696" width="366" height="24" fill="#1F160C"/>

    <!-- 타자기 (매트 블랙): 어두운 덩어리, 잔광의 모서리 빛 -->
    <g>
      <polygon points="616,674 700,674 694,640 622,640" fill="#12100D"/>
      <polygon points="622,640 694,640 690,631 626,631" fill="#1B1714"/>
      <rect x="633" y="652" width="50" height="8" fill="#0A0806"/>
      <polygon points="622,640 694,640 693,638 623,638" fill="#3E4650" opacity="0.5"/>
      <!-- 반쯤 타이핑된 종이 — 프레임에서 세 번째로 밝은 것 (글자는 읽히지 않는다) -->
      <g filter="url(#soft2)">
        <polygon points="643,631 673,631 675,588 647,588" fill="#7E796B"/>
        <polygon points="648,598 671,598 671,600 648,600" fill="#5E5A50" opacity="0.7"/>
        <polygon points="648,606 666,606 666,608 648,608" fill="#5E5A50" opacity="0.6"/>
      </g>
    </g>

    <!-- 책상 램프: 녹색 유리 갓, 황동 — 꺼져 있다. 책상은 아직 주인을 기다리는 시간이 아니다 -->
    <g>
      <rect x="838" y="624" width="4.5" height="42" fill="#2E2514"/>
      <path d="M 818 624 Q 840 606 864 624 L 858 633 Q 840 620 824 633 Z" fill="#16261C"/>
      <ellipse cx="832" cy="622" rx="7" ry="3" fill="#49545E" opacity="0.55"/>
      <ellipse cx="840" cy="667" rx="12" ry="3.5" fill="#1A140C" opacity="0.5"/>
    </g>
  </g>

  <!-- ══ 오른쪽: 스탠드 빛과 큰 의자의 일부 윤곽 ══ -->
  <g>
    <!-- 책 더미 3무더기 (5.9, 4.2 — 무릎 높이 이하) -->
    <g>
      <g transform="translate(1300,0)">
        <rect x="0" y="836" width="58" height="14" fill="#241B10"/><rect x="3" y="823" width="52" height="13" fill="#2A1E13"/>
        <rect x="6" y="811" width="47" height="12" fill="#201810"/><rect x="4" y="800" width="50" height="11" fill="#2E2213"/>
      </g>
      <g transform="translate(1368,0)">
        <rect x="0" y="848" width="62" height="15" fill="#2A1E11"/><rect x="4" y="834" width="55" height="14" fill="#221809"/>
        <rect x="2" y="820" width="58" height="14" fill="#302416"/><rect x="7" y="808" width="48" height="12" fill="#261C10"/>
        <rect x="5" y="796" width="52" height="12" fill="#342718"/>
      </g>
      <g transform="translate(1438,0)">
        <rect x="0" y="858" width="56" height="16" fill="#261C10"/><rect x="3" y="844" width="50" height="14" fill="#2E2113"/>
        <rect x="1" y="830" width="54" height="14" fill="#241A0E"/>
      </g>
      <rect class="lamp-light" x="1372" y="790" width="130" height="90" fill="#C98F55" opacity="0.24" filter="url(#soft6)"/>
    </g>

    <!-- 큰 의자 (6.3, 4.6) 모스그린 울 윙체어 — 오른쪽 일부만 프레임에 -->
    <g>
      <ellipse cx="1452" cy="890" rx="150" ry="22" fill="#0A0806" opacity="0.65" filter="url(#soft6)"/>
      <!-- 몸체: 등받이가 프레임 오른쪽으로 잘려 나간다 -->
      <path d="M 1350 886 L 1350 764 Q 1346 706 1370 672 Q 1394 638 1444 630 L 1502 624 L 1502 886 Z"
            fill="#26332A"/>
      <!-- 윙 안쪽 면 -->
      <path d="M 1370 672 Q 1394 638 1444 630 L 1448 702 Q 1404 704 1382 730 Z" fill="#2E3D31"/>
      <!-- 왼쪽 팔걸이 (둥근 두루마리) -->
